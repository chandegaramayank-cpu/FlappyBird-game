<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./modiiiii.png" type="image/x-icon">
    <title>SlappyBird Pro v.0.1</title>

    <style>
        body {
            background-color: #098a98;
            /*background-image: url(./flappyland.png);
            background-repeat: no-repeat;
            background-size: cover;
            height: 95vh;
            animation: round infinite 5s 1 direction fill-mode;*/
        }
        
        .bird {
            height: 60px;
            position: fixed;
            top: 200px;
            left: 100px;
            transition: all 0.01s linear;
            z-index:6;
        }
        
        .ground{
            position: fixed;
            bottom:0;
            left:0;
            width: 100%;
            height: 700px;
            background-image: url("flappyland.png");
            background-repeat: repeat-x;
            background-size: auto 100%;
            z-index: -1;
        }
        
        
        
        @keyframes jump {
            0% { transform: translateY(0); }
            50% { transform: translateY(-50px); }
            100% { transform: translateY(0); }
        }
        
        .pipe {
            position: fixed;
            width: 70px;
            background-image: url("./flappypipe.png");
            background-repeat: no-repeat;
            background-size: 70px auto;  
            background-position: center;
            image-rendering: pixelated;
            z-index: 5;
        }

        .top {
          top: 0;
          transform: rotate(180deg);
          transform-origin: center;
        }

        .bottom {
          bottom: 100px;
        }


    
    </style>
</head>

<body>
    <div class="pipe top"></div>
    <div class="pipe bottom"></div>
    <img class="bird" src="./flappybird.png" alt="bird">
    <div class="ground"></div>
</body>
<script src="script.js"></script>
</html>
